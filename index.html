<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Cute Gacha Wheel</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tobiasetzel/tiktok-live-connector@1.0.0/dist/tiktok-live-connector.min.js"></script>
    
    <style>
        :root {
            --bg-main: #f0f4f8;
            --panel-bg: #ffffff;
            --accent-pink: #ff6b8b;
            --accent-yellow: #feca57;
            --accent-blue: #54a0ff;
            --text-dark: #2c3e50;
            --border-soft: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Layout หลักรองรับ Responsive */
        .app-layout {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @media (min-width: 992px) {
            .app-layout { flex-direction: row; }
        }

        /* ==================== แผงหลังบ้าน (กะทัดรัดขึ้น) ==================== */
        .admin-panel {
            width: 100%;
            background-color: var(--panel-bg);
            border-bottom: 2px solid var(--border-soft);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media (min-width: 992px) {
            .admin-panel {
                width: 360px;
                border-bottom: none;
                border-right: 2px solid var(--border-soft);
                height: 100vh;
                overflow-y: auto;
            }
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-pink);
            margin: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            color: #7f8c8d;
            font-weight: bold;
        }

        input[type="text"], input[type="number"] {
            background-color: #f8fafc;
            border: 2px solid var(--border-soft);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-dark);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-pink);
        }

        .btn {
            background-color: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(255, 107, 139, 0.2);
        }

        .btn:active { transform: scale(0.95); }
        .btn-connect { background-color: #2ecc71; box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2); }
        .btn-disconnect { background-color: #e74c3c; }

        .item-manager-table {
            width: 100%;
            border-collapse: collapse;
        }

        .item-manager-table th, .item-manager-table td {
            padding: 6px;
            font-size: 12px;
            border-bottom: 1px solid var(--border-soft);
        }

        .preview-thumb {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 6px;
            background-color: #eee;
        }

        /* ==================== หน้าจอแสดงผล (ฝั่งวงล้อ) ==================== */
        .display-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 200;
            background-color: var(--accent-blue);
            padding: 8px 16px;
            font-size: 12px;
        }

        .user-marquee {
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.4s ease;
        }

        .user-marquee.active {
            opacity: 1;
            transform: translateY(0);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .user-title {
            font-size: 16px;
            font-weight: 600;
            margin-top: 4px;
            background: white;
            padding: 2px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .wheel-outer {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 15px 0;
        }

        @media (min-width: 576px) {
            .wheel-outer { width: 340px; height: 340px; }
        }

        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 22px solid var(--accent-pink);
            z-index: 10;
        }

        .gacha-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background-color: white;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            z-index: 100;
            width: 260px;
        }

        .gacha-alert.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .alert-prize-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin: 10px 0;
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-6px); }
        }

        @media (fullscreen) or (-webkit-fullscreen) {
            .admin-panel { display: none !important; }
            .display-stage {
                background-color: var(--bg-main);
                width: 100vw;
                height: 100vh;
                padding: 10px;
                flex-direction: row;
                justify-content: space-around;
            }
            .wheel-outer { width: 70vh; height: 70vh; margin: 0; }
            .user-marquee { height: auto; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="app-layout" id="appLayout">
        
        <div class="admin-panel" id="adminPanel">
            <h1 class="panel-title">🌱 สวนสุ่มกิฟต์ TikTok</h1>
            
            <div class="form-group">
                <label>ชื่อช่อง TikTok</label>
                <div style="display: flex; gap: 6px;">
                    <input type="text" id="tiktokInput" style="flex: 1;" placeholder="เช่นช่องของคุณ">
                    <button class="btn btn-connect" id="connectBtn" onclick="toggleConnection()">เปิด</button>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>เวลาหมุน (วิ)</label>
                    <input type="number" id="spinDurationInput" value="4">
                </div>
                <div class="form-group">
                    <label>รอบหมุนขั้นต่ำ</label>
                    <input type="number" id="minRotationsInput" value="5">
                </div>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between;"><label>รายการรางวัล</label><span id="totalRateTxt" style="font-size:11px; font-weight:600; color:#e74c3c;">0%</span></div>
                <table class="item-manager-table">
                    <tbody id="prizeTableBody"></tbody>
                </table>
                <button class="btn" style="background: #f1f5f9; color: #64748b; padding:6px; font-size:12px; margin-top:5px;" onclick="addNewPrizeRow()">+ เพิ่มรางวัล</button>
            </div>

            <button class="btn" style="background: var(--accent-blue);" onclick="saveConfigToLocalStorage()">💾 บันทึกการตั้งค่า</button>
        </div>

        <div class="display-stage" id="displayStage">
            <button class="btn fullscreen-btn" onclick="openFullscreen()">📺 เต็มจอแนวนอน</button>
            
            <div class="user-marquee" id="userMarquee">
                <img class="user-avatar" id="userAvatar" src="" alt="User">
                <div class="user-title" id="userTitle">คนดูดวงดีกำลังมา...</div>
            </div>

            <div class="wheel-outer">
                <div class="wheel-pointer"></div>
                <canvas class="wheel-canvas" id="wheelCanvas" width="500" height="500"></canvas>
            </div>

            <div class="gacha-alert" id="gachaAlert">
                <div style="font-size: 12px; color: #7f8c8d; font-weight:bold;">สุ่มได้เมล็ด!</div>
                <div id="alertWinnerName" style="font-size: 16px; font-weight: 600; color: var(--accent-pink);">Name</div>
                <img class="alert-prize-img" id="alertPrizeImg" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><rect width='80' height='80' fill='%23fff'/></svg>">
                <div id="alertPrizeName" style="font-size: 20px; font-weight: 600; color: var(--text-dark);">เมล็ดทองคำ</div>
            </div>
        </div>

    </div>
    <script>
        let defaultPrizes = [
            { name: "เมล็ดแครอท", rate: 50, img: "" },
            { name: "เมล็ดแตงโม", rate: 30, img: "" },
            { name: "เมล็ดแอปเปิ้ล", rate: 15, img: "" },
            { name: "เมล็ดทองคำ", rate: 5, img: "" }
        ];

        let appConfig = { tiktokUsername: "", spinDuration: 4, minRotations: 5, prizes: defaultPrizes };

        if(localStorage.getItem('cute_gacha_config')) {
            try { appConfig = JSON.parse(localStorage.getItem('cute_gacha_config')); } catch(e) {}
        }

        const userCoins = {}; let gachaQueue = []; let isSpinning = false; let currentWheelRotation = 0; let tiktokConnect = null;

        window.onload = function() {
            document.getElementById('tiktokInput').value = appConfig.tiktokUsername || "";
            document.getElementById('spinDurationInput').value = appConfig.spinDuration || 4;
            document.getElementById('minRotationsInput').value = appConfig.minRotations || 5;
            renderPrizeTable();
        };

        function openFullscreen() {
            const elem = document.getElementById('displayStage');
            if (elem.requestFullscreen) { elem.requestFullscreen(); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            
            if(window.screen.orientation && window.screen.orientation.lock) {
                window.screen.orientation.lock('landscape').catch(()=>{});
            }
        }

        function renderPrizeTable() {
            const tbody = document.getElementById('prizeTableBody'); tbody.innerHTML = ""; let totalRate = 0;
            appConfig.prizes.forEach((prize, index) => {
                totalRate += Number(prize.rate);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="text" value="${prize.name}" onchange="updatePrizeData(${index}, 'name', this.value)" style="width:100%; padding:4px;"></td>
                    <td style="width:60px;"><input type="number" value="${prize.rate}" onchange="updatePrizeData(${index}, 'rate', this.value)" style="width:100%; padding:4px;"></td>
                    <td style="display:flex; align-items:center; gap:4px;">
                        <img class="preview-thumb" id="thumb-${index}" src="${prize.img || 'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'28\' height=\'28\'><rect width=\'28\' height=\'28\' fill=\'%23ddd\'/></svg>'}">
                        <input type="file" accept="image/*" onchange="handleImageUpload(this, ${index})" style="display:none;" id="file-${index}">
                        <button class="btn" style="padding:2px 6px; font-size:10px; background:#64748b;" onclick="document.getElementById('file-${index}').click()">รูป</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            document.getElementById('totalRateTxt').innerText = `${totalRate}%`;
            drawWheel(currentWheelRotation);
        }

        function updatePrizeData(index, field, value) {
            appConfig.prizes[index][field] = field === 'rate' ? Number(value) : value;
            let totalRate = appConfig.prizes.reduce((sum, p) => sum + Number(p.rate), 0);
            document.getElementById('totalRateTxt').innerText = `${totalRate}%`;
            drawWheel(currentWheelRotation);
        }

        function addNewPrizeRow() { appConfig.prizes.push({ name: "เมล็ดใหม่", rate: 0, img: "" }); renderPrizeTable(); }

        function handleImageUpload(input, index) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    appConfig.prizes[index].img = e.target.result;
                    document.getElementById(`thumb-${index}`).src = e.target.result;
                    drawWheel(currentWheelRotation);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveConfigToLocalStorage() {
            appConfig.tiktokUsername = document.getElementById('tiktokInput').value;
            appConfig.spinDuration = Number(document.getElementById('spinDurationInput').value);
            appConfig.minRotations = Number(document.getElementById('minRotationsInput').value);
            localStorage.setItem('cute_gacha_config', JSON.stringify(appConfig));
            alert("บันทึกหน้าจอระบบน่ารักสดใสเรียบร้อย!");
        }

        function drawWheel(currentRotationAngle) {
            const canvas = document.getElementById('wheelCanvas'); const ctx = canvas.getContext('2d');
            const numSegments = appConfig.prizes.length; if (numSegments === 0) return;
            const centerX = canvas.width / 2; const centerY = canvas.height / 2; const radius = canvas.width / 2 - 10;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const totalWeight = appConfig.prizes.reduce((sum, p) => sum + Number(p.rate), 0); if(totalWeight === 0) return;

            let currentAngle = currentRotationAngle * Math.PI / 180;
            const brightColors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe', '#fd79a8'];

            appConfig.prizes.forEach((prize, i) => {
                const segmentAngle = (Number(prize.rate) / totalWeight) * (Math.PI * 2);
                ctx.beginPath(); ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + segmentAngle); ctx.closePath();
                ctx.fillStyle = brightColors[i % brightColors.length]; ctx.fill();
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4; ctx.stroke();

                ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(currentAngle + segmentAngle / 2);
                ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 15px Kanit'; ctx.textAlign = 'right';
                ctx.fillText(prize.name, radius - 35, 5); ctx.restore();
                currentAngle += segmentAngle;
            });
        }

        function toggleConnection() {
            const inputField = document.getElementById('tiktokInput'); const connectBtn = document.getElementById('connectBtn');
            if (!tiktokConnect) {
                const userToConnect = inputField.value.trim(); if(!userToConnect) return alert("ใส่ชื่อช่องก่อนครับ");
                connectBtn.innerText = "โหลด...";
                tiktokConnect = new TikTokLiveConnector(userToConnect);
                tiktokConnect.connect().then(() => {
                    connectBtn.innerText = "ปิดระบบ"; connectBtn.className = "btn btn-disconnect";
                }).catch(() => { alert("เชื่อมไลฟ์ไม่สำเร็จ"); connectBtn.innerText = "เปิด"; connectBtn.className = "btn btn-connect"; tiktokConnect = null; });

                tiktokConnect.on('gift', (data) => {
                    const username = data.uniqueId; const nickname = data.nickname; const profilePic = data.profilePictureUrl;
                    const coinCount = data.diamondCount * data.repeatCount;
                    if (!userCoins[username]) userCoins[username] = 0;
                    userCoins[username] += coinCount;
                    while (userCoins[username] >= 5) {
                        userCoins[username] -= 5;
                        gachaQueue.push({ username, nickname, profilePic });
                    }
                    executeGachaQueue();
                });
            } else {
                tiktokConnect.disconnect(); tiktokConnect = null;
                connectBtn.innerText = "เปิด"; connectBtn.className = "btn btn-connect";
            }
        }

        function executeGachaQueue() {
            if (isSpinning || gachaQueue.length === 0) return; isSpinning = true;
            const currentUser = gachaQueue.shift();
            const marquee = document.getElementById('userMarquee');
            document.getElementById('userAvatar').src = currentUser.profilePic;
            document.getElementById('userTitle').innerText = `🎉 คุณ ${currentUser.nickname}`;
            marquee.classList.add('active');

            const totalWeight = appConfig.prizes.reduce((sum, p) => sum + Number(p.rate), 0);
            let randomWeightPoint = Math.random() * totalWeight; let winningPrizeIndex = 0; let currentWeightSum = 0;
            for (let i = 0; i < appConfig.prizes.length; i++) {
                currentWeightSum += Number(appConfig.prizes[i].rate);
                if (randomWeightPoint <= currentWeightSum) { winningPrizeIndex = i; break; }
            }
            const winningPrize = appConfig.prizes[winningPrizeIndex];

            let previousAnglesSum = 0;
            for(let i=0; i<winningPrizeIndex; i++) { previousAnglesSum += (Number(appConfig.prizes[i].rate) / totalWeight) * 360; }
            const prizeSegmentArc = (Number(winningPrize.rate) / totalWeight) * 360;
            const targetPrizeCenterAngle = previousAnglesSum + (prizeSegmentArc / 2);
            const stopAngleOffset = (270 - targetPrizeCenterAngle + 360) % 360;
            
            const minRots = Number(document.getElementById('minRotationsInput').value) || 5;
            const spinTimeSec = Number(document.getElementById('spinDurationInput').value) || 4;
            const targetTotalRotation = (360 * minRots) + stopAngleOffset;

            let startTimestamp = null; const initialRotation = currentWheelRotation % 360;

            function animateWheel(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                const elapsed = timestamp - startTimestamp; const progress = Math.min(elapsed / (spinTimeSec * 1000), 1);
                const easeOutCubic = 1 - Math.pow(1 - progress, 3);
                currentWheelRotation = initialRotation + (targetTotalRotation - initialRotation) * easeOutCubic;
                drawWheel(currentWheelRotation);

                if (progress < 1) { requestAnimationFrame(animateWheel); } else {
                    const alertBox = document.getElementById('gachaAlert');
                    document.getElementById('alertWinnerName').innerText = currentUser.nickname;
                    document.getElementById('alertPrizeName').innerText = winningPrize.name;
                    document.getElementById('alertPrizeImg').src = winningPrize.img || 'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'80\' height=\'80\'><rect width=\'80\' height=\'80\' fill=\'%23ffeaa7\'/></svg>';
                    alertBox.classList.add('show');

                    setTimeout(() => {
                        alertBox.classList.remove('show'); marquee.classList.remove('active');
                        setTimeout(() => { isSpinning = false; executeGachaQueue(); }, 400);
                    }, 3000);
                }
            }
            requestAnimationFrame(animateWheel);
        }
    </script>
</body>
</html>
