<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Premium Gacha System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tobiasetzel/tiktok-live-connector@1.0.0/dist/tiktok-live-connector.min.js"></script>
    
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a1e;
            --border-color: #2a2a30;
            --accent-color: #00ffff;
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
        }

        * {
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* โครงสร้างหน้าเว็บแบ่งเป็น 2 ฝั่งหลัก */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ==================== ฝั่งที่ 1: แผงควบคุมหลังบ้าน ==================== */
        .admin-panel {
            width: 420px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--accent-color);
            margin: 0;
            text-transform: uppercase;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
        }

        input[type="text"], input[type="number"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn {
            background-color: var(--accent-color);
            color: #000000;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-disconnect {
            background-color: #ff3b30;
            color: #fff;
        }

        /* ตารางจัดการไอเทมรางวัล */
        .item-manager-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
        }

        .item-manager-table th, .item-manager-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        .item-manager-table th {
            color: var(--text-muted);
            font-weight: 400;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .preview-thumb {
            width: 32px;
            height: 32px;
            object-fit: cover;
            border-radius: 4px;
            background-color: var(--bg-color);
        }

        /* ==================== ฝั่งที่ 2: หน้าจอแสดงผล (ดึงเข้า OBS) ==================== */
        .display-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: transparent; /* ให้แอดมินเจาะพื้นหลังโปร่งใสใน OBS ได้ */
        }

        /* หน้าต่างแสดงคิวคนสุ่มด้านบน */
        .user-marquee {
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .user-marquee.active {
            opacity: 1;
            transform: translateY(0);
        }

        .user-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            object-fit: cover;
        }

        .user-title {
            font-size: 18px;
            font-weight: 600;
            margin-top: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* พื้นที่วงล้อแนวโมเดิร์น (สไตล์เรียบหรูแบนราบ ไม่ใช้ Gradient ลิเก) */
        .wheel-outer {
            position: relative;
            width: 360px;
            height: 360px;
            margin-top: 20px;
        }

        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #2a2a30;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: rotate(0deg);
        }

        /* ตัวชี้ตำแหน่งรางวัลด้านบน */
        .wheel-pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 24px solid var(--accent-color);
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* ป๊อปอัปแอนิเมชันผลรางวัลตอนสุ่มเสร็จ */
        .gacha-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background-color: #16161a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 100;
            min-width: 280px;
        }

        .gacha-alert.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .alert-prize-img {
            width: 96px;
            height: 96px;
            object-fit: contain;
            margin: 15px 0;
            animation: floatEffect 2s ease-in-out infinite;
        }

        @keyframes floatEffect {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* สัญลักษณ์สถานะระบบ */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ff3b30;
        }

        .status-dot.connected {
            background-color: #34c759;
            box-shadow: 0 0 8px #34c759;
        }
    </style>
</head>
<body>

    <div class="app-layout">
        
        <div class="admin-panel" id="adminPanel">
            <div>
                <h1 class="panel-title">Gacha Dashboard</h1>
                <p style="font-size: 12px; color: var(--text-muted); margin: 4px 0 0 0;">จัดการระบบควบคุมความเร็วและเรตสุ่มผ่านหน้าเว็บ</p>
            </div>

            <div class="form-group">
                <label>ชื่อบัญชี TikTok Live (ไม่ต้องใส่ @)</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="tiktokInput" style="flex: 1;" placeholder="เช่น mychannel.live">
                    <button class="btn" id="connectBtn" onclick="toggleConnection()" style="padding: 12px 20px;">เชื่อมต่อ</button>
                </div>
                <div class="status-badge">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">ยังไม่ได้เชื่อมต่อไลฟ์</span>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 0;">

            <div class="form-group">
                <h3 style="font-size: 14px; margin: 0; color: var(--text-main);">ความเร็วและเวลาสุ่ม</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px;">
                    <div class="form-group">
                        <label>เวลาหมุน (วินาที)</label>
                        <input type="number" id="spinDurationInput" value="4" min="2" max="10">
                    </div>
                    <div class="form-group">
                        <label>จำนวนรอบที่หมุนขั้นต่ำ</label>
                        <input type="number" id="minRotationsInput" value="5" min="2" max="15">
                    </div>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 0;">

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="font-size: 14px; margin: 0; color: var(--text-main);">รายการของรางวัลและเรตสุ่ม</h3>
                    <span id="totalRateTxt" style="font-size: 12px; color: #ff3b30; font-weight: 600;">รวม: 0%</span>
                </div>
                <p style="font-size: 11px; color: var(--text-muted); margin: 0;">*สุ่มอิงตามสัดส่วนค่าน้ำหนักเปอร์เซ็นต์จริง (รวมควรได้ 100%)</p>
                
                <table class="item-manager-table">
                    <thead>
                        <tr>
                            <th>ชื่อเมล็ด/ของรางวัล</th>
                            <th style="width: 70px;">โอกาส (%)</th>
                            <th style="width: 50px; text-align: center;">รูปภาพ</th>
                        </tr>
                    </thead>
                    <tbody id="prizeTableBody">
                        </tbody>
                </table>
                <button class="btn" style="background-color: transparent; border: 1px dashed var(--border-color); color: var(--text-muted); margin-top: 8px;" onclick="addNewPrizeRow()">+ เพิ่มรายการรางวัลใหม่</button>
            </div>

            <button class="btn" style="margin-top: auto; background-color: #242428; color: #fff; border: 1px solid var(--border-color);" onclick="saveConfigToLocalStorage()">บันทึกการตั้งค่าทั้งหมดลงเครื่อง</button>
        </div>

        <div class="display-stage">
            
            <div class="user-marquee" id="userMarquee">
                <img class="user-avatar" id="userAvatar" src="" alt="User profile">
                <div class="user-title" id="userTitle">กำลังสุ่มรางวัล...</div>
            </div>

            <div class="wheel-outer">
                <div class="wheel-pointer"></div>
                <canvas class="wheel-canvas" id="wheelCanvas" width="500" height="500"></canvas>
            </div>

            <div class="gacha-alert" id="gachaAlert">
                <div style="font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">ผลการสุ่ม</div>
                <div id="alertWinnerName" style="font-size: 20px; font-weight: 600; margin-top: 4px; color: var(--accent-color);">คุณสตรีมเมอร์</div>
                <img class="alert-prize-img" id="alertPrizeImg" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='%23222'/></svg>" alt="Prize image">
                <div id="alertPrizeName" style="font-size: 24px; font-weight: 600;">เมล็ดทองคำ</div>
            </div>
            
        </div>

    </div>

    <script>
        // --- ส่วนการตั้งค่าข้อมูลเบื้องต้นและโหลดข้อมูลจากความจำ (LocalStorage) ---
        let defaultPrizes = [
            { name: "เมล็ดแครอท", rate: 50, img: "" },
            { name: "เมล็ดแตงโม", rate: 30, img: "" },
            { name: "เมล็ดแอปเปิ้ล", rate: 15, img: "" },
            { name: "เมล็ดทองคำ", rate: 5, img: "" }
        ];

        let appConfig = {
            tiktokUsername: "",
            spinDuration: 4,
            minRotations: 5,
            prizes: defaultPrizes
        };

        // โหลดค่าเก่าที่เคยตั้งไว้ถ้ามีอยู่แล้วในเครื่องเบราว์เซอร์
        if(localStorage.getItem('premium_gacha_config')) {
            try {
                appConfig = JSON.parse(localStorage.getItem('premium_gacha_config'));
            } catch(e) { console.error("โหลดข้อมูลจำล้มเหลว กำลังใช้ค่าเริ่มต้นแทน", e); }
        }

        const userCoins = {};      // บันทึกแต้มสะสมเหรียญ
        let gachaQueue = [];       // ลำดับคิวผู้เล่น
        let isSpinning = false;    // ตัวบอกสถานะหมุนวงล้อ
        let currentWheelRotation = 0; // เก็มองศาปัจจุบันสะสมไว้ของวงล้อ
        let tiktokConnect = null;

        // ฟังก์ชันเริ่มรันระบบสแตนด์บายดึงข้อมูลเมื่อเปิดหน้าเว็บ
        window.onload = function() {
            document.getElementById('tiktokInput').value = appConfig.tiktokUsername || "";
            document.getElementById('spinDurationInput').value = appConfig.spinDuration || 4;
            document.getElementById('minRotationsInput').value = appConfig.minRotations || 5;
            
            renderPrizeTable();
            drawWheel(0);
        };

        // เจนตารางแผงควบคุมตามไอเทมในตัวแปรข้อมูล
        function renderPrizeTable() {
            const tbody = document.getElementById('prizeTableBody');
            tbody.innerHTML = "";
            let totalRate = 0;

            appConfig.prizes.forEach((prize, index) => {
                totalRate += Number(prize.rate);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="text" value="${prize.name}" onchange="updatePrizeData(${index}, 'name', this.value)" style="width:100%; padding:6px; font-size:12px;"></td>
                    <td><input type="number" value="${prize.rate}" onchange="updatePrizeData(${index}, 'rate', this.value)" style="width:100%; padding:6px; font-size:12px;"></td>
                    <td style="display:flex; align-items:center; gap:6px; justify-content:center;">
                        <img class="preview-thumb" id="thumb-${index}" src="${prize.img || 'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'32\' height=\'32\'><rect width=\'32\' height=\'32\' fill=\'%232a2a30\'/></svg>'}">
                        <input type="file" accept="image/*" onchange="handleImageUpload(this, ${index})" style="display:none;" id="file-${index}">
                        <button class="btn" style="padding:4px 8px; font-size:11px; background-color:#3a3a40; color:#fff;" onclick="document.getElementById('file-${index}').click()">เลือก</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            const rateTxt = document.getElementById('totalRateTxt');
            rateTxt.innerText = `รวม: ${totalRate}%`;
            rateTxt.style.color = (totalRate === 100) ? "#34c759" : "#ff3b30";
            
            drawWheel(currentWheelRotation);
        }

        function updatePrizeData(index, field, value) {
            appConfig.prizes[index][field] = field === 'rate' ? Number(value) : value;
            updateTotalRateIndicator();
            drawWheel(currentWheelRotation);
        }

        function updateTotalRateIndicator() {
            let totalRate = appConfig.prizes.reduce((sum, p) => sum + Number(p.rate), 0);
            const rateTxt = document.getElementById('totalRateTxt');
            rateTxt.innerText = `รวม: ${totalRate}%`;
            rateTxt.style.color = (totalRate === 100) ? "#34c759" : "#ff3b30";
        }

        function addNewPrizeRow() {
            appConfig.prizes.push({ name: "เมล็ดใหม่", rate: 0, img: "" });
            renderPrizeTable();
        }

        // ตัวแปลงรูปภาพอัปโหลดให้อยู่ในรูปแบบ String Base64 เพื่อเซฟลง LocalStorage ได้
        function handleImageUpload(input, index) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    appConfig.prizes[index].img = e.target.result;
                    document.getElementById(`thumb-${index}`).src = e.target.result;
                    drawWheel(currentWheelRotation);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveConfigToLocalStorage() {
            appConfig.tiktokUsername = document.getElementById('tiktokInput').value;
            appConfig.spinDuration = Number(document.getElementById('spinDurationInput').value);
            appConfig.minRotations = Number(document.getElementById('minRotationsInput').value);
            
            localStorage.setItem('premium_gacha_config', JSON.stringify(appConfig));
            alert("บันทึกข้อมูลการตั้งค่าทั้งหมดลงในเครื่องของคุณสำเร็จแล้ว!");
        }

        // --- ระบบวาดภาพวงล้อ (Canvas Processing) ---
        function drawWheel(currentRotationAngle) {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const numSegments = appConfig.prizes.length;
            if (numSegments === 0) return;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 10;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // ค่าน้ำหนักสัดส่วนรวมของรางวัลทั้งหมด
            const totalWeight = appConfig.prizes.reduce((sum, p) => sum + Number(p.rate), 0);
            if(totalWeight === 0) return;

            let currentAngle = currentRotationAngle * Math.PI / 180;

            // สลับสีเรียบแนวสปอร์ตสตรีม ไม่ไล่เฉดสีชวนเวียนหัว
            const segmentColors = ['#1e1e24', '#26262b', '#2e2e35', '#36363c'];

            appConfig.prizes.forEach((prize, i) => {
                const segmentAngle = (Number(prize.rate) / totalWeight) * (Math.PI * 2);
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + segmentAngle);
                ctx.closePath();
                
                ctx.fillStyle = segmentColors[i % segmentColors.length];
                ctx.fill();
                ctx.strokeStyle = '#2a2a30';
                ctx.lineWidth = 2;
                ctx.stroke();

                // วาดข้อความชื่อเมล็ดในส่วนแบ่งวงล้อ
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(currentAngle + segmentAngle / 2);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px Kanit';
                ctx.textAlign = 'right';
                ctx.fillText(prize.name, radius - 30, 5);
                ctx.restore();

                currentAngle += segmentAngle;
            });
        }

        // --- ระบบการจัดการเชื่อมต่อเข้าห้องไลฟ์สดของ TikTok ---
        function toggleConnection() {
            const inputField = document.getElementById('tiktokInput');
            const connectBtn = document.getElementById('connectBtn');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            if (!tiktokConnect) {
                const userToConnect = inputField.value.trim();
                if(!userToConnect) return alert("กรุณาป้อนชื่อช่อง TikTok ก่อนครับ");

                statusText.innerText = "กำลังเชื่อมต่อ...";
                tiktokConnect = new TikTokLiveConnector(userToConnect);

                tiktokConnect.connect().then(() => {
                    statusDot.classList.add('connected');
                    statusText.innerText = `เชื่อมต่อกับไลฟ์ช่อง ${userToConnect} แล้ว`;
                    connectBtn.innerText = "ตัดการทำงาน";
                    connectBtn.classList.add('btn-disconnect');
                    appConfig.tiktokUsername = userToConnect;
                }).catch(err => {
                    alert("เชื่อมต่อห้องไลฟ์ล้มเหลว ตรวจสอบชื่อช่องหรือความถูกต้องของไลฟ์อีกครั้งครับ");
                    statusText.innerText = "การเชื่อมต่อผิดพลาด";
                    tiktokConnect = null;
                });

                // ตรวจรับ Event ดึงข้อมูลของขวัญเมื่อเข้าสู่ระบบไลฟ์
                tiktokConnect.on('gift', (data) => {
                    const username = data.uniqueId;
                    const nickname = data.nickname;
                    const profilePic = data.profilePictureUrl;
                    const coinCount = data.diamondCount * data.repeatCount;

                    if (!userCoins[username]) userCoins[username] = 0;
                    userCoins[username] += coinCount;

                    while (userCoins[username] >= 5) {
                        userCoins[username] -= 5;
                        gachaQueue.push({
                            username: username,
                            nickname: nickname,
                            profilePic: profilePic
                        });
                    }
                    executeGachaQueue();
                });

            } else {
                tiktokConnect.disconnect();
                tiktokConnect = null;
                statusDot.classList.remove('connected');
                statusText.innerText = "ตัดการเชื่อมต่อแล้ว";
                connectBtn.innerText = "เชื่อมต่อ";
                connectBtn.classList.remove('btn-disconnect');
            }
        }

        // --- ระบบคิวประมวลผลการหมุนวงล้อร่วมกับแอนิเมชันแบบสตรีมเมอร์โปร ---
        function executeGachaQueue() {
            if (isSpinning || gachaQueue.length === 0) return;
            isSpinning = true;

            const currentUser = gachaQueue.shift();

            // แสดงหน้าตาคิวคนได้สิทธิ์หมุน
            const marquee = document.getElementById('userMarquee');
            document.getElementById('userAvatar').src = currentUser.profilePic;
            document.getElementById('userTitle').innerText = `${currentUser.nickname} กำลังสุ่ม...`;
            marquee.classList.add('active');

            // คำนว感สุ่มหาไอเทมรางวัลอิงตามเปอร์เซ็นต์แบบจับกลุ่มเรตน้ำหนักรวม (Weighted Random)
            const totalWeight = appConfig.prizes.reduce((sum, p) => sum + Number(p.rate), 0);
            let randomWeightPoint = Math.random() * totalWeight;
            let winningPrizeIndex = 0;
            let currentWeightSum = 0;

            for (let i = 0; i < appConfig.prizes.length; i++) {
                currentWeightSum += Number(appConfig.prizes[i].rate);
                if (randomWeightPoint <= currentWeightSum) {
                    winningPrizeIndex = i;
                    break;
                }
            }

            const winningPrize = appConfig.prizes[winningPrizeIndex];

            // คำนวณหาจุดตกเป็นองศาเพื่อให้เข็มชี้ตรงกับตำแหน่งล็อคไอเทมนั้นๆ
            let previousAnglesSum = 0;
            for(let i=0; i<winningPrizeIndex; i++) {
                previousAnglesSum += (Number(appConfig.prizes[i].rate) / totalWeight) * 360;
            }
            const prizeSegmentArc = (Number(winningPrize.rate) / totalWeight) * 360;
            const targetPrizeCenterAngle = previousAnglesSum + (prizeSegmentArc / 2);
            
            // ปรับสมดุลตามโครงสร้าง Canvas ให้อิงกับจุดเข็มชี้ตรงหัวมุมบนสุด (270 องศา)
            const stopAngleOffset = (270 - targetPrizeCenterAngle + 360) % 360;
            
            const minRots = Number(document.getElementById('minRotationsInput').value) || 5;
            const spinTimeSec = Number(document.getElementById('spinDurationInput').value) || 4;
            const targetTotalRotation = (360 * minRots) + stopAngleOffset;

            // รันระบบวาด Loop Animation ตัววงล้อเพื่อเร่งความเร็วและชะลอจุดหยุดแบบสมูท
            let startTimestamp = null;
            const initialRotation = currentWheelRotation % 360;

            function animateWheel(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                const elapsed = timestamp - startTimestamp;
                const progress = Math.min(elapsed / (spinTimeSec * 1000), 1);

                // สมการคำนวณเบรกชะลอความเร็วแบบนุ่มนวล (Ease-Out Cubic Performance)
                const easeOutCubic = 1 - Math.pow(1 - progress, 3);
                currentWheelRotation = initialRotation + (targetTotalRotation - initialRotation) * easeOutCubic;

                drawWheel(currentWheelRotation);

                if (progress < 1) {
                    requestAnimationFrame(animateWheel);
                } else {
                    // วงล้อหยุดทำงานเรียบร้อย แสดงหน้าต่างแจ้งเตือนทันที
                    const alertBox = document.getElementById('gachaAlert');
                    document.getElementById('alertWinnerName').innerText = currentUser.nickname;
                    document.getElementById('alertPrizeName').innerText = winningPrize.name;
                    document.getElementById('alertPrizeImg').src = winningPrize.img || 'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'96\' height=\'96\'><rect width=\'96\' height=\'96\' fill=\'%232a2a30\'/></svg>';
                    
                    alertBox.classList.add('show');

                    setTimeout(() => {
                        alertBox.classList.remove('show');
                        marquee.classList.remove('active');
                        
                        setTimeout(() => {
                            isSpinning = false;
                            executeGachaQueue(); // ดึงคิวลำดับถัดไปเข้ามาทำงาน
                        }, 600);
                    }, 3500);
                }
            }

            requestAnimationFrame(animateWheel);
        }
    </script>
</body>
</html>
